name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.1.152
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          # `set -e` so any failing step aborts the run instead of silently
          # logging "Deploy complete" while traffic is broken (the
          # previous workflow swallowed a port-collision and reported
          # success — see commit message for context).
          script: |
            set -euo pipefail

            cd /opt/nbne/manufacture

            # ─── Pull latest ────────────────────────────────────────
            git fetch origin main
            git reset --hard origin/main
            echo "Deploying $(git rev-parse --short HEAD)"

            # ─── Compose invocation ─────────────────────────────────
            # Always use `-p manufacture -f docker/docker-compose.yml` —
            # see MEMORY.md "Manufacture Hetzner compose project name".
            # Without -p, compose derives the project from the working
            # directory (`docker`) and creates a duplicate stack that
            # collides on ports 3015 / 8015 with the canonical one.
            COMPOSE="docker compose -p manufacture -f docker/docker-compose.yml --env-file /opt/nbne/manufacture/.env"

            # ─── Rebuild and restart ────────────────────────────────
            $COMPOSE up -d --build --remove-orphans

            # ─── Wait for backend to be healthy ─────────────────────
            # Poll for up to 60s. Fail loudly if it doesn't come up so
            # we don't repeat the silent-failure deploy of 1 May.
            echo "Waiting for backend to start..."
            for i in $(seq 1 30); do
              status=$($COMPOSE ps --status running --services 2>/dev/null | grep -x backend || true)
              if [ "$status" = "backend" ]; then
                echo "Backend is running."
                break
              fi
              if [ "$i" = "30" ]; then
                echo "ERROR: backend did not start within 60s. Last logs:"
                $COMPOSE logs --tail 50 backend || true
                exit 1
              fi
              sleep 2
            done

            # ─── Run migrations ─────────────────────────────────────
            $COMPOSE exec -T backend python manage.py migrate --noinput

            echo "Deploy complete: $(git rev-parse --short HEAD)"
