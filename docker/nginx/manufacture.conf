server {
    listen 443 ssl http2;
    server_name manufacture.nbnesigns.co.uk;

    ssl_certificate /etc/ssl/cloudflare/nbne/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nbne/origin-key.pem;

    client_max_body_size 20M;

    # Static files from Django
    location /static/ {
        proxy_pass http://127.0.0.1:8015;
        proxy_set_header Host $host;
    }

    # Django API
    location /api/ {
        proxy_pass http://127.0.0.1:8015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js frontend (everything else)
    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name manufacture.nbnesigns.co.uk;
    return 301 https://$host$request_uri;
}
