services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: manufacture
      POSTGRES_USER: nbne
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nbne -d manufacture"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8015}:8000"
    environment:
      DATABASE_URL: postgres://nbne:${DB_PASSWORD}@db:5432/manufacture
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${DOMAIN:-localhost},localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}
      CSRF_TRUSTED_ORIGINS: https://${DOMAIN:-localhost}
      SPREADSHEET_PATH: /data/spreadsheet.xlsx
      PHLOE_API_URL: ${PHLOE_API_URL:-}
      PHLOE_API_TOKEN: ${PHLOE_API_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.ionos.co.uk}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      CAIRN_API_URL: ${CAIRN_API_URL:-http://deploy-cairn-api-1:8765}
      CAIRN_API_KEY: ${CAIRN_API_KEY:-}
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID:-}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET:-}
      AMAZON_REFRESH_TOKEN_EU: ${AMAZON_REFRESH_TOKEN_EU:-}
      AMAZON_REFRESH_TOKEN_NA: ${AMAZON_REFRESH_TOKEN_NA:-}
      AMAZON_REFRESH_TOKEN_AU: ${AMAZON_REFRESH_TOKEN_AU:-}
      LABEL_COMMAND_LANGUAGE: ${LABEL_COMMAND_LANGUAGE:-zpl}
      LABEL_WIDTH_MM: ${LABEL_WIDTH_MM:-50}
      LABEL_HEIGHT_MM: ${LABEL_HEIGHT_MM:-25}
      LABEL_DPI: ${LABEL_DPI:-203}
      PRINT_AGENT_TOKEN: ${PRINT_AGENT_TOKEN:-}
      LABELARY_API_BASE: ${LABELARY_API_BASE:-http://api.labelary.com/v1}
      # --- FBA Shipment Automation (Phase 2) -----------------------------
      SP_API_ENVIRONMENT: ${SP_API_ENVIRONMENT:-PRODUCTION}
      FBA_SHIP_FROM_NAME: ${FBA_SHIP_FROM_NAME:-NBNE Print & Sign Ltd}
      FBA_SHIP_FROM_COMPANY: ${FBA_SHIP_FROM_COMPANY:-NBNE Print & Sign Ltd}
      FBA_SHIP_FROM_LINE1: ${FBA_SHIP_FROM_LINE1:-}
      FBA_SHIP_FROM_LINE2: ${FBA_SHIP_FROM_LINE2:-}
      FBA_SHIP_FROM_CITY: ${FBA_SHIP_FROM_CITY:-Alnwick}
      FBA_SHIP_FROM_STATE: ${FBA_SHIP_FROM_STATE:-}
      FBA_SHIP_FROM_COUNTRY: ${FBA_SHIP_FROM_COUNTRY:-GB}
      FBA_SHIP_FROM_POSTCODE: ${FBA_SHIP_FROM_POSTCODE:-}
      FBA_SHIP_FROM_PHONE: ${FBA_SHIP_FROM_PHONE:-}
      FBA_SHIP_FROM_EMAIL: ${FBA_SHIP_FROM_EMAIL:-}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_SENDER: ${POSTMARK_SENDER:-alerts@nbnesigns.com}
      FBA_ALERT_RECIPIENT: ${FBA_ALERT_RECIPIENT:-toby@nbnesigns.com}
      # --- Sales Velocity (Phase 2B) -------------------------------------
      SALES_VELOCITY_WRITE_ENABLED: ${SALES_VELOCITY_WRITE_ENABLED:-False}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_RU_NAME: ${EBAY_RU_NAME:-}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-production}
    volumes:
      - media:/app/media
      - ${SPREADSHEET_PATH:-/opt/nbne/manufacture/spreadsheet.xlsx}:/data/spreadsheet.xlsx:ro
    networks:
      - default
      - cairn_net
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------------------- #
  # Django-Q2 cluster — drives the FBA Shipment Automation state machine     #
  # (fba_shipments.services.workflow.advance_plan). Uses the same image as   #
  # backend so it sees identical code + env. Broker is Postgres via the      #
  # Django ORM, so no Redis/RabbitMQ dependency.                             #
  # ----------------------------------------------------------------------- #
  qcluster:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    command: ["python", "manage.py", "qcluster"]
    environment:
      DATABASE_URL: postgres://nbne:${DB_PASSWORD}@db:5432/manufacture
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${DOMAIN:-localhost},localhost,127.0.0.1,backend
      # qcluster needs the same SP-API + FBA env as the backend
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID:-}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET:-}
      AMAZON_REFRESH_TOKEN_EU: ${AMAZON_REFRESH_TOKEN_EU:-}
      AMAZON_REFRESH_TOKEN_NA: ${AMAZON_REFRESH_TOKEN_NA:-}
      AMAZON_REFRESH_TOKEN_AU: ${AMAZON_REFRESH_TOKEN_AU:-}
      SP_API_ENVIRONMENT: ${SP_API_ENVIRONMENT:-PRODUCTION}
      FBA_SHIP_FROM_NAME: ${FBA_SHIP_FROM_NAME:-NBNE Print & Sign Ltd}
      FBA_SHIP_FROM_COMPANY: ${FBA_SHIP_FROM_COMPANY:-NBNE Print & Sign Ltd}
      FBA_SHIP_FROM_LINE1: ${FBA_SHIP_FROM_LINE1:-}
      FBA_SHIP_FROM_LINE2: ${FBA_SHIP_FROM_LINE2:-}
      FBA_SHIP_FROM_CITY: ${FBA_SHIP_FROM_CITY:-Alnwick}
      FBA_SHIP_FROM_STATE: ${FBA_SHIP_FROM_STATE:-}
      FBA_SHIP_FROM_COUNTRY: ${FBA_SHIP_FROM_COUNTRY:-GB}
      FBA_SHIP_FROM_POSTCODE: ${FBA_SHIP_FROM_POSTCODE:-}
      FBA_SHIP_FROM_PHONE: ${FBA_SHIP_FROM_PHONE:-}
      FBA_SHIP_FROM_EMAIL: ${FBA_SHIP_FROM_EMAIL:-}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_SENDER: ${POSTMARK_SENDER:-alerts@nbnesigns.com}
      FBA_ALERT_RECIPIENT: ${FBA_ALERT_RECIPIENT:-toby@nbnesigns.com}
      Q_CLUSTER_WORKERS: ${Q_CLUSTER_WORKERS:-2}
      # --- Sales Velocity (Phase 2B) -------------------------------------
      # qcluster runs the daily aggregator, so it needs the same Cairn
      # cross-service auth + eBay OAuth env as the backend.
      CAIRN_API_URL: ${CAIRN_API_URL:-http://deploy-cairn-api-1:8765}
      CAIRN_API_KEY: ${CAIRN_API_KEY:-}
      SALES_VELOCITY_WRITE_ENABLED: ${SALES_VELOCITY_WRITE_ENABLED:-False}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_RU_NAME: ${EBAY_RU_NAME:-}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-production}
    volumes:
      - media:/app/media
    networks:
      - default
      - cairn_net
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN:-localhost}
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3015}:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  media:

networks:
  default: {}
  cairn_net:
    external: true
    name: deploy_default
